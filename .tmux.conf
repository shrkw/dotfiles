# General settings
set-option -g prefix C-t
set-window-option -g mode-keys vi
set-option -g default-shell /bin/zsh

set-option -g history-limit 5000

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane
## Move like vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

## Resize like vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# マウス操作を有効にする
set-option -g mouse on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# 256色端末を使用する
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Status bar
set -g status-style "bg=black,fg=white"
setw -g window-status-style "bg=default,fg=cyan,dim"
setw -g window-status-current-style "bg=red,fg=white,bright"
set -g pane-active-border-style "fg=cyan"

# Status bar
## 左パネルを設定する
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
## 右パネルを設定する
set -g status-right "#[fg=cyan][%Y-%m-%d %H:%M]"
## リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 60
## ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on
## ステータスバーを上部に表示する
set -g status-position top

## zshのときだけwindow名をカレントディレクトリにする
set -g automatic-rename on
set -g window-status-format         '#I:#{?#{m:#W,zsh},#{b:pane_current_path},#W}#F'
set -g window-status-current-format '#I:#{?#{m:#W,zsh},#{b:pane_current_path},#W}#F'
