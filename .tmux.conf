# General settings
set-option -g prefix C-t
set-window-option -g mode-keys vi
set-option -g default-shell /bin/zsh

set-option -g history-limit 5000

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane
## Move like vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

## Resize like vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# マウス操作を有効にする
set-option -g mouse on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# 256色端末を使用する
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Status bar
set -g status-position top
set -g status-justify centre
set -g status-interval 15
set -g status-left-length 32
set -g status-right-length 96
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086]#I:#P"
set -g status-right "#[fg=#6c7086]#{b:pane_current_path} #[fg=#45475a]| #[fg=#a6e3a1]%Y-%m-%d #[fg=#f9e2af]%H:%M "

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

setw -g window-status-separator ""
setw -g window-status-style "bg=#1e1e2e,fg=#6c7086"
setw -g window-status-current-style "bg=#313244,fg=#cdd6f4,bold"
setw -g window-status-format " #I:#{?#{m:#W,zsh},#{b:pane_current_path},#W}#F "
setw -g window-status-current-format " #I:#{?#{m:#W,zsh},#{b:pane_current_path},#W}#F "

## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on

## zshのときだけwindow名をカレントディレクトリにする
set -g automatic-rename on
